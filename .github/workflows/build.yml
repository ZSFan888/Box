name: 🚀 Build ProxyMax APK

on:
  push:
    branches: [ main, dev ]
  workflow_dispatch:

env:
  JAVA_VERSION: "17"

jobs:
  prepare-cores:
    name: 📦 Prepare Go Cores
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download & place .so files
        run: |
          chmod +x scripts/place_libs.sh
          bash scripts/place_libs.sh
      - uses: actions/upload-artifact@v4
        with:
          name: jniLibs
          path: app/src/main/jniLibs/

  build-debug:
    name: 🔨 Build Debug APK
    needs: prepare-cores
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle
      - name: Download jniLibs
        uses: actions/download-artifact@v4
        with:
          name: jniLibs
          path: app/src/main/jniLibs/
      - name: Grant gradlew permission
        run: |
          chmod +x ./gradlew
          ls -l ./gradlew
      - name: Build Debug APK
        # 使用 bash 显式调用，确保解析正确
        run: bash ./gradlew assembleDebug --no-daemon --stacktrace
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ProxyMax-debug
          path: app/build/outputs/apk/debug/*.apk
