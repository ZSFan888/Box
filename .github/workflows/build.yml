name: Build & Test APK

on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with: { java-version: "17", distribution: "temurin" }

      - name: Fetch sing-box libbox (jar + libbox.so v1.13.11)
        run: |
          BASE="https://github.com/sagernet/sing-box/releases/download/v1.13.11"
          mkdir -p app/libs

          # 下载 universal APK，提取 classes.dex
          curl -fsSL -o /tmp/sfa_uni.apk "${BASE}/SFA-1.13.11-universal.apk"
          unzip -o /tmp/sfa_uni.apk "classes*.dex" -d /tmp/sfa_uni
          ls /tmp/sfa_uni/

          # 用 dex2jar 把 dex 转成可用的 jar（包含 io.nekohasekai.libbox.* Java 类）
          curl -fsSL -o /tmp/dex2jar.zip \
            "https://github.com/pxb1988/dex2jar/releases/download/v2.4/dex-tools-v2.4.zip"
          unzip -q /tmp/dex2jar.zip -d /tmp/d2j
          D2J=$(find /tmp/d2j -name "d2j-dex2jar.sh" | head -1)
          chmod +x "$D2J"

          # 只转 classes.dex（libbox 主 dex）
          bash "$D2J" -o /tmp/libbox_full.jar /tmp/sfa_uni/classes.dex
          echo "libbox_full.jar: $(du -sh /tmp/libbox_full.jar | cut -f1)"

          # 只保留 io/nekohasekai/ 和 go/ 包，剔除 androidx/appcompat/android.support 等
          # 避免 Duplicate class 冲突
          mkdir -p /tmp/libbox_filtered
          cd /tmp/libbox_filtered
          jar xf /tmp/libbox_full.jar
          # 白名单策略：只保留 io/ (nekohasekai) 和 go/ (gomobile JNI)
          # 删除所有其他顶级目录，彻底杜绝 Duplicate class 冲突
          find . -mindepth 1 -maxdepth 1 -type d \
            ! -name io ! -name go \
            -exec rm -rf {} + 2>/dev/null || true
          find . -mindepth 1 -maxdepth 1 -type f -delete 2>/dev/null || true
          jar cf /tmp/libbox.jar .
          cd -
          cp /tmp/libbox.jar app/libs/libbox.jar
          echo "libbox.jar (io+go only): $(du -sh app/libs/libbox.jar | cut -f1)"
          jar tf app/libs/libbox.jar | grep "nekohasekai/libbox/Libbox" || echo "WARNING: Libbox class not found"
          echo "Total classes: $(jar tf app/libs/libbox.jar | grep \.class | wc -l)"

          # 提取各 ABI libbox.so
          for ABI in arm64-v8a armeabi-v7a x86_64; do
            curl -fsSL -o "/tmp/sfa_${ABI}.apk" "${BASE}/SFA-1.13.11-${ABI}.apk"
            mkdir -p "app/src/main/jniLibs/${ABI}"
            unzip -o "/tmp/sfa_${ABI}.apk" "lib/${ABI}/libbox.so" -d /tmp/lbtmp
            cp "/tmp/lbtmp/lib/${ABI}/libbox.so" "app/src/main/jniLibs/${ABI}/libbox.so"
            rm -rf /tmp/lbtmp "/tmp/sfa_${ABI}.apk"
            echo "✅ jniLibs/${ABI}/libbox.so ($(du -sh app/src/main/jniLibs/${ABI}/libbox.so | cut -f1))"
          done
          rm -rf /tmp/sfa_uni /tmp/sfa_uni.apk /tmp/d2j /tmp/dex2jar.zip

      - name: Set version info
        run: |
          echo "VERSION_CODE=${{ github.run_number }}" >> $GITHUB_ENV
          # tag 格式 v1.2.3 → 1.2.3，否则用 1.0.${{ github.run_number }}
          RAW_TAG="${{ github.ref_name }}"
          if [[ "$RAW_TAG" =~ ^v[0-9] ]]; then
            echo "VERSION_NAME=${RAW_TAG#v}" >> $GITHUB_ENV
          else
            echo "VERSION_NAME=1.0.${{ github.run_number }}" >> $GITHUB_ENV
          fi

      - name: Build Debug APK
        run: |
          ./gradlew :app:assembleDebug --no-daemon --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx1g -XX:MaxMetaspaceSize=512m" \
            2>&1 | tee /tmp/build.log
          grep -E "(Caused by|error:|FAILED|Unresolved|cannot find)" /tmp/build.log | head -60 || true
          grep -q "BUILD SUCCESSFUL" /tmp/build.log && exit 0 || exit 1


      - name: Build Release APK
        if: github.ref == 'refs/heads/main'
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
            ./gradlew :app:assembleRelease --no-daemon \
              -Dorg.gradle.jvmargs="-Xmx1g -XX:MaxMetaspaceSize=512m" \
              2>&1 | tee /tmp/release_build.log
            grep -q "BUILD SUCCESSFUL" /tmp/release_build.log \
              && echo "✅ Release APK built" \
              || { echo "❌ Release build failed"; exit 1; }
          else
            echo "⚠️  KEYSTORE_BASE64 not set — skipping release build"
          fi

      - name: Upload Release APK
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: APK-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: APK-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Enable KVM
        if: success()
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run on Android Emulator
        if: success()
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: Nexus 6
          avd-name: test_avd
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: bash .github/scripts/smoke_test.sh

      - name: Upload Crash Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crash-logs
          path: |
            /tmp/crash_log.txt
            /tmp/app_logcat.txt
          if-no-files-found: warn

      - name: Upload Build Error Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-log
          path: /tmp/build.log
          if-no-files-found: warn
