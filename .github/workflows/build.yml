name: 🚀 Build ProxyMax APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: "17", distribution: "temurin" }
      - run: |
          chmod +x scripts/place_libs.sh
          bash scripts/place_libs.sh
          chmod +x ./gradlew
          # 禁用 daemon 和 parallel，确保 CI 环境不会因并发引发 Daemon 崩溃
          bash ./gradlew assembleDebug --no-daemon --no-parallel --stacktrace
      - uses: actions/upload-artifact@v4
        with: { name: ProxyMax-debug, path: app/build/outputs/apk/debug/*.apk }
