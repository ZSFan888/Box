name: Build & Test APK

on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with: { java-version: "17", distribution: "temurin" }

      - name: Build Debug APK
        run: |
          ./gradlew :app:assembleDebug --no-daemon --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx1g -XX:MaxMetaspaceSize=512m" \
            2>&1 | tee /tmp/build.log
          grep -E "(Caused by|error:|FAILED|Unresolved|cannot find)" /tmp/build.log | head -60 || true
          grep -q "BUILD SUCCESSFUL" /tmp/build.log && exit 0 || exit 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: APK-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Enable KVM
        if: success()
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run on Android Emulator
        if: success()
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: Nexus 6
          avd-name: test_avd
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: bash .github/scripts/smoke_test.sh

      - name: Upload Crash Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crash-logs
          path: |
            /tmp/crash_log.txt
            /tmp/app_logcat.txt
          if-no-files-found: warn

      - name: Upload Build Error Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-log
          path: /tmp/build.log
          if-no-files-found: warn
