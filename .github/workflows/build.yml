name: Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: "17", distribution: "temurin" }
      - run: |
          chmod +x scripts/place_libs.sh
          bash scripts/place_libs.sh
          chmod +x ./gradlew
          # 仅编译 app 模块，禁用所有可能导致内存溢出的优化
          ./gradlew :app:assembleDebug -Pandroid.enableDexingArtifactTransform.desugaring=false --stacktrace
      - uses: actions/upload-artifact@v4
        with: { name: APK, path: app/build/outputs/apk/debug/*.apk }
