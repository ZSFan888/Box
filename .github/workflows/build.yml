name: 🚀 Build ProxyMax APK

on:
  push:
    branches: [ main, dev ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug / release)'
        required: true
        default: 'debug'
        type: choice
        options: [ debug, release ]

env:
  MIHOMO_VERSION:  "v1.18.9"
  XRAY_VERSION:    "v25.4.30"
  SINGBOX_VERSION: "v1.9.7"
  JAVA_VERSION:    "17"

jobs:
  # ══════════════════════════════════════════════════════════════════════
  # Job 1: 下载并准备三大核心 .so 文件
  # ══════════════════════════════════════════════════════════════════════
  prepare-cores:
    name: 📦 Prepare Go Cores
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate cache key
        id: cache-key
        run: |
          KEY="cores-${{ env.MIHOMO_VERSION }}-${{ env.XRAY_VERSION }}-${{ env.SINGBOX_VERSION }}"
          echo "key=$KEY" >> $GITHUB_OUTPUT

      - name: Cache cores
        id: cache-cores
        uses: actions/cache@v4
        with:
          path: app/src/main/jniLibs
          key: ${{ steps.cache-key.outputs.key }}

      - name: Download & place .so files
        if: steps.cache-cores.outputs.cache-hit != 'true'
        env:
          MIHOMO_VERSION:  ${{ env.MIHOMO_VERSION }}
          XRAY_VERSION:    ${{ env.XRAY_VERSION }}
          SINGBOX_VERSION: ${{ env.SINGBOX_VERSION }}
        run: |
          chmod +x scripts/place_libs.sh
          bash scripts/place_libs.sh

      - name: Upload jniLibs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: jniLibs
          path: app/src/main/jniLibs/
          retention-days: 1

  # ══════════════════════════════════════════════════════════════════════
  # Job 2: 构建 Debug APK
  # ══════════════════════════════════════════════════════════════════════
  build-debug:
    name: 🔨 Build Debug APK
    needs: prepare-cores
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')) ||
      github.event.inputs.build_type == 'debug'
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Download jniLibs
        uses: actions/download-artifact@v4
        with:
          name: jniLibs
          path: app/src/main/jniLibs/

      - name: Show lib status
        run: |
          echo "=== jniLibs 文件清单 ==="
          find app/src/main/jniLibs -type f | sort || echo "(empty)"

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleUniversalDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          SHA="${{ github.sha }}"
          mv "$APK" "ProxyMax-debug-${SHA:0:8}.apk"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ProxyMax-debug-${{ github.sha }}
          path: ProxyMax-debug-*.apk

  # ══════════════════════════════════════════════════════════════════════
  # Job 3: 构建 Release APK（tag push 或手动触发）
  # ══════════════════════════════════════════════════════════════════════
  build-release:
    name: 🏷️ Build Release APK
    needs: prepare-cores
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      github.event.inputs.build_type == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Download jniLibs
        uses: actions/download-artifact@v4
        with:
          name: jniLibs
          path: app/src/main/jniLibs/

      - name: Setup signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            echo "KEYSTORE_FILE=$PWD/keystore.jks" >> $GITHUB_ENV
            echo "✅ Keystore loaded"
          else
            echo "⚠️  No keystore found, APK will be unsigned (debug signing)"
          fi

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleUniversalRelease --no-daemon --stacktrace

      - name: Rename APK
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          VER="${{ github.ref_name }}"
          mv "$APK" "ProxyMax-${VER}.apk"

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProxyMax-release-${{ github.ref_name }}
          path: ProxyMax-*.apk

      - name: 🎉 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ProxyMax-*.apk
          generate_release_notes: true
          body: |
            ## ProxyMax ${{ github.ref_name }}

            ### 内置内核版本
            | 内核 | 版本 |
            |---|---|
            | Mihomo (Clash.Meta) | ${{ env.MIHOMO_VERSION }} |
            | Xray-core | ${{ env.XRAY_VERSION }} |
            | sing-box | ${{ env.SINGBOX_VERSION }} |

            ### 安装说明
            下载 `ProxyMax-${{ github.ref_name }}.apk` 安装即可。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
