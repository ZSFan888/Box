name: Build & Test APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with: { java-version: "17", distribution: "temurin" }

      # ── 构建 APK ─────────────────────────────────────────────────────
      - name: Build Debug APK
        run: |
          ./gradlew :app:assembleDebug --no-daemon --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx1g -XX:MaxMetaspaceSize=512m" \
            2>&1 | tee /tmp/build.log
          grep -E "(Caused by|error:|FAILED|Unresolved|cannot find)" /tmp/build.log | head -60 || true
          grep -q "BUILD SUCCESSFUL" /tmp/build.log && exit 0 || exit 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: APK-debug
          path: app/build/outputs/apk/debug/*.apk

      # ── 模拟器启动测试 ────────────────────────────────────────────────
      - name: Enable KVM
        if: success()
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run on Android Emulator
        if: success()
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: Nexus 6
          avd-name: test_avd
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: |
            echo "=== Installing APK ==="
            adb install -r app/build/outputs/apk/debug/*.apk

            echo "=== Clearing logcat ==="
            adb logcat -c

            echo "=== Launching App ==="
            adb shell am start -W -n com.proxymax.app/com.proxymax.MainActivity 2>&1 || true

            echo "=== Waiting 10s ==="
            sleep 10

            echo "=== Capturing logs ==="
            APP_PID=$(adb shell pidof -s com.proxymax.app 2>/dev/null || true)
            if [ -n "$APP_PID" ]; then
              adb logcat -d --pid="$APP_PID" -v time > /tmp/app_logcat.txt 2>&1 || true
            else
              adb logcat -d -v time > /tmp/app_logcat.txt 2>&1 || true
            fi

            adb logcat -d -v time | grep -E \
              "AndroidRuntime|FATAL EXCEPTION|Process: com\.proxymax|WM-Worker|Caused by" \
              > /tmp/crash_log.txt 2>&1 || true

            echo "=== Crash / Worker log (last 60 lines) ==="
            tail -60 /tmp/crash_log.txt || echo "(no crash detected)"

            echo "=== App still running? ==="
            if adb shell pidof com.proxymax.app > /dev/null 2>&1; then
              echo "✅ App is running!"
            else
              echo "❌ App crashed or not running"
              exit 1
            fi

      - name: Upload Crash Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crash-logs
          path: |
            /tmp/crash_log.txt
            /tmp/app_logcat.txt
          if-no-files-found: warn

      - name: Upload Build Error Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-log
          path: /tmp/build.log
          if-no-files-found: warn
