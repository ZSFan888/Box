name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK
        uses: actions/setup-java@v4
        with: { java-version: "17", distribution: "temurin" }
      - name: Show project structure
        run: |
          echo "=== Gradle version ==="
          cat gradle/wrapper/gradle-wrapper.properties
          echo "=== build.gradle ==="
          cat build.gradle.kts || cat build.gradle || echo "no root build.gradle"
          echo "=== app build.gradle ==="
          cat app/build.gradle.kts || cat app/build.gradle || echo "no app build.gradle"
          echo "=== settings.gradle ==="
          cat settings.gradle.kts || cat settings.gradle || echo "no settings.gradle"
      - name: Build APK
        run: ./gradlew :app:assembleDebug --no-daemon --no-parallel --stacktrace -Dorg.gradle.jvmargs="-Xmx1g -XX:MaxMetaspaceSize=512m"
        continue-on-error: true
      - name: Upload Logs on Failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            app/build/reports/
            ~/.gradle/daemon/*/daemon-*.out.log
